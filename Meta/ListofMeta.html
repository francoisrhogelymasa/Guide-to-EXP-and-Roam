<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="StyleList.css">
    <title>List of Meta</title>
</head>

<body>
    <audio id="bgm" src="audio/bgm.mp3" loop></audio>

<button id="musicToggle" class="music-btn">🔊</button>
    <h1>List of Meta Heroes</h1>

    <h3>Roamers</h3>

    <h4>Gloo</h4>
    <div class="center">
        <img class="hero"
             data-text="Gloo is a tank that excels in split fights and sticking to enemies. He can annoy enemy junglers, gold laners, and is generally very annoying to go up against when he targets you. He can apply his stacks easily, which can cancel your mobility."
             data-audio="audio/Gloo.mp3"
             src="https://rare-gallery.com/mocahbig/1388727-Gloo-Mobile-Legends-Video-Game.jpg"
             height="400">
        <p class="info"></p>
    </div>

    <h4>Marcel</h4>
    <div class="center">
        <img class="hero"
             data-text="Marcel is a strong roamer with great engage potential. He is often used to stop initiations, and can use his ultimate to stop projectiles as if he freezes them in time. His passive freezes any enemies who go near him, so he is perfect for protecting squishies against burst assasins."
             data-audio="audio/Marcel.mp3"
             src="https://tse1.mm.bing.net/th/id/OIP.xp0IM19qsoyRHWoN_fJWlAHaMC?rs=1&pid=ImgDetMain&o=7&rm=3"
             height="400">
        <p class="info"></p>
    </div>

    <h4>Minotaur</h4>
    <div class="center">
        <img class="hero"
             data-text="Minotaur is a tank with powerful rage-based crowd control. He is has one of the most versatile kits, as he can inflict slow, stun, and heal his teammates with his low cooldown second skill."
             data-audio="audio/Minotaur.mp3"
             src="https://rare-gallery.com/mocahbig/1393951-Minotaur-Mobile-Legends-Video-Game.jpg"
             height="400">
        <p class="info"></p>
    </div>

    <h4>Atlas</h4>
    <div class="center">
        <img class="hero"
             data-text="Atlas is a top-tier initiator with deadly AoE lockdown. All of his skills inflict crowd control, he is also one of the fastest heroes in the game. His passive is really good for chasing enemies, and slowing them down until they are frozen for about 1 second."
             data-audio="audio/Atlas.mp3"
             src="https://i.pinimg.com/736x/71/84/86/7184860ecf358cebcbe66c372e6c03c8.jpg"
             height="400">
        <p class="info"></p>
    </div>

    <h4>Khufra</h4>
    <div class="center">
        <img class="hero"
             data-text="Khufra counters dash heroes and controls teamfights with ease. His first skill is a long dash which when charged up increases the range, it is a great initiation tool, his ultimate pushes enemies and stuns them longer when they are pushed towards a wall, his second skill cancels any and all dash skills."
             data-audio="audio/Khufra.mp3"
             src="https://i.pinimg.com/736x/e3/ca/2f/e3ca2fff71d5de9b36443336b09f215f.jpg"
             height="400">
        <p class="info"></p>
    </div>

    <h3>Exp Laners</h3>

    <h4>Gloo</h4>
    <div class="center">
        <img class="hero"
             data-text="Gloo dominates 1v1 matchups and is hard to kill in lane. He is even more annoying as an exp laner, because he excels in isolated fights."
             data-audio="audio/Gloo.mp3"
             src="https://rare-gallery.com/mocahbig/1388727-Gloo-Mobile-Legends-Video-Game.jpg"
             height="400">
        <p class="info"></p>
    </div>

    <h4>Sun</h4>
    <div class="center">
        <img class="hero"
             data-text="Sun overwhelms enemies with clones and strong split-pushing. He is a high mobility xp laner, who can rotate and take objectives very fast. His clones increase his mobility and his ability to ambush people."
             data-audio="audio/Sun.mp3"
             src="https://tse1.mm.bing.net/th/id/OIP.bVit2HYLAK1k-tyH1M09tAAAAA?rs=1&pid=ImgDetMain&o=7&rm=3"
             height="400">
        <p class="info"></p>
    </div>

    <h4>Guinevere</h4>
    <div class="center">
        <img class="hero"
             data-text="Guinevere excels at burst damage and anti-dash combos. She can lockdown anyone with her second skill and ultimate, her combos are very easy to learn, and her passive gives her lower cooldowns and lifesteal."
             data-audio="audio/Guinevere.mp3"
             src="https://th.bing.com/th/id/R.c9db997c399f28a44a59aafc44ca693c?rik=BOqHJOD1s4n4ng&pid=ImgRaw&r=0"
             height="400">
        <p class="info"></p>
    </div>

    <h4>Phoveus</h4>
    <div class="center">
        <img class="hero"
             data-text="Phoveus punishes dash heroes and becomes tankier as fights go on. His ultimate slows groups of people, gives him good sustain, and deals decent levels of damage, he is stronger against multiple people, and can be a frontliner in teamfights."
             data-audio="audio/Phoveus.mp3"
             src="https://theriagames.com/wp-content/uploads/2025/03/Mobile-Legends-Phoveus.webp"
             height="400">
        <p class="info"></p>
    </div>

    <h4>Xborg</h4>
    <div class="center">
        <img class="hero"
             data-text="Xborg is a durable fighter with strong sustained damage. He is a prominent exp laner, his true damage can bypass any defense, and he has high levels of sustain and durability, his ultimate deals a massive amount of damage, and he has really good AOE."
             data-audio="audio/Xborg.mp3"
             src="https://rare-gallery.com/mocahbig/1393911-X-Borg-Mobile-Legends-Video-Game.jpg"
             height="400">
        <p class="info"></p>
    </div>

    <h1><a href="../index.html">Back to Main Page</a></h1>

    <script src="ListofMeta.js"></script>
</body>
</html>
